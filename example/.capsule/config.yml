# capsule configuration
# All keys are optional. CLI flags take precedence over this file.
#
# Precedence (highest → lowest):
#   CLI flag → this file → compiled-in default

# Number of iterations to run.
# CLI: --iterations / -i
iterations: 3

# Path to the prompt file. Defaults to .capsule/prompt.md in the capsule dir.
# CLI: --prompt / -p
prompt: .capsule/prompt.md

# Claude model to use inside the container.
# CLI: --model / -m
model: claude-sonnet-4-6

# Print verbose (unfiltered) container output to stderr in addition to the
# jq-filtered view. Useful for diagnosing a failing run.
# CLI: --verbose / -v
verbose: false

# Git commit identity for commits made inside the container.
#   user    — read host `git config user.name` / `user.email` (default)
#   capsule — use "Capsule <capsule@localhost>"
# CLI: --git-identity
git_identity: user

# GitHub token injection scope.
#   local  — read GH_TOKEN from .capsule/.env only
#   global — read from process env, fall back to `gh auth token`
# When absent, no token is injected.
# CLI: --github
github: local
